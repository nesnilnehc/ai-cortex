name: PR Check

on:
  pull_request:
    branches: [main]
    paths:
      - 'skills/**'
      - 'manifest.json'
      - 'spec/**'
      - 'schemas/**'
      - 'scripts/**'

permissions:
  contents: read

jobs:
  verify:
    name: Verify Registry & Skill Structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Verify registry sync
        run: node scripts/verify-registry.mjs

      - name: Verify skill structure (spec v2.0.0)
        run: node scripts/verify-skill-structure.mjs
