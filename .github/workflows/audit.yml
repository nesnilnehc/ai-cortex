name: Skill Audit

on:
  push:
    branches: [main]
    paths:
      - 'skills/**'
      - 'manifest.json'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    name: Registry & Structure Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Verify registry sync
        run: node scripts/verify-registry.mjs

      - name: Verify skill structure (spec v2.0.0)
        run: node scripts/verify-skill-structure.mjs

      - name: Summary
        if: always()
        run: |
          echo "## Skill Audit Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Registry sync: verified" >> "$GITHUB_STEP_SUMMARY"
          echo "- Skill structure (spec v2.0.0): verified" >> "$GITHUB_STEP_SUMMARY"
          echo "- Skills count: $(ls -d skills/*/SKILL.md 2>/dev/null | wc -l | tr -d ' ')" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "> ASQM scoring requires manual \`curate-skills\` invocation." >> "$GITHUB_STEP_SUMMARY"
