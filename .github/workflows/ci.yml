# CI: verify registry, skill structure, and run tests.
# Triggers on push/PR to main when skills, scripts, or config change.
name: CI
on:
  push:
    branches: [main]
    paths:
      - 'skills/**'
      - 'scripts/**'
      - 'manifest.json'
      - 'llms.txt'
      - 'AGENTS.md'
      - 'README.md'
      - '.claude-plugin/**'
      - 'package.json'
      - 'specs/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'skills/**'
      - 'scripts/**'
      - 'manifest.json'
      - 'llms.txt'
      - 'AGENTS.md'
      - 'README.md'
      - '.claude-plugin/**'
      - 'package.json'
      - 'specs/**'
      - '.github/workflows/ci.yml'

permissions:
  contents: read

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Verify all
        run: npm run verify
