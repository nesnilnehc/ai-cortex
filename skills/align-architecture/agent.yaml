name: align-architecture
status: validated
primary_use: Verify architecture and design documents against code; produce Architecture
  Compliance Report when implementation diverges from ADR or design decisions.
inputs:
- optional ADR or design doc paths
- optional code scope
- optional project docs root
outputs:
- Architecture Compliance Report (docs/calibration/architecture-compliance.md; overwritten
  unless snapshot requested)
- machine-readable compliance gaps block
has_output_contract: true
acceptance_criteria:
- 给定 ADR/设计文档路径与代码范围，产出 Architecture Compliance Report 含差距列表，每条含 type（boundary_violation/outdated_design/undocumented/partial_validation）/design_source/code_location/impact/fix
- 当无设计文档时，输出 status=blocked 报告并指向 design-solution 或 bootstrap-docs 移交建议，而非编造合规结论
- 产出机器可读 compliance_gaps YAML 块，每条含 id/severity/fix_kind 供 plan-next/auto-iterate 消费
- （v1.4）扫描 ADR 目录，检出 V1（superseded 缺 superseded_by）/ V2（broken pointer）/ V3（双向不一致）/ V4（同维度冲突，置信度≥0.7）违规，追加到 architecture-compliance.md「ADR 状态完整性」章节
overlaps_with:
- nesnilnehc/ai-cortex:align-planning
- nesnilnehc/ai-cortex:review-architecture
- nesnilnehc/ai-cortex:design-solution
- nesnilnehc/ai-cortex:assess-docs
market_position: differentiated
tags:
- workflow
- documentation
version: 1.4.0
