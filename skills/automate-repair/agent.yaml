agent_native: 4
asqm_quality: 15
cognitive: 3
composability: 3
inputs:
- target repository path (default .)
- scope (diff | codebase)
- test mode (fast | ci | full)
- constraints (allow installs, allow network, allow Docker/services)
- max_iterations (default 5)
lifecycle_state: Experimental
market_position: commodity
name: automate-repair
outputs:
- repair loop report (iterations, commands run, failures, patches applied, final convergence
  state)
overlaps_with:
- nesnilnehc/ai-cortex:review-code
- nesnilnehc/ai-cortex:automate-tests
primary_use: Iteratively review changes, run automated tests, apply targeted fixes,
  and repeat until tests pass and no blocking review findings remain (or stop conditions
  are hit).
scores:
  agent_native: 5
  cognitive: 4
  composability: 4
  stance: 4
stance: 5
status: validated
tags:
- automation
- devops
- optimization
validation_gates:
  gate_a:
    name: Agent-ready
    requirement: agent_native >= 4
    status: pass
  gate_b:
    name: Design integrity
    requirement: stance >= 3
    status: pass
