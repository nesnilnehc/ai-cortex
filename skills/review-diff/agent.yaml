name: review-diff
status: validated
primary_use: Review only git diff for impact, regression, correctness, compatibility,
  and side effects. Scope-only atomic skill; output is a findings list for aggregation.
inputs:
- git diff (staged + unstaged)
outputs:
- findings list (Location, Category=scope, Severity, Title, Description, Suggestion)
has_output_contract: true
acceptance_criteria:
- 给定 git diff 范围，产出 findings 列表，每条含 Location/Category=scope/Severity/Title/Description/Suggestion
- 聚焦影响、回归、正确性、兼容性与副作用；输出可被 review-code 聚合
overlaps_with:
- nesnilnehc/ai-cortex:review-codebase
- nesnilnehc/ai-cortex:review-code
- wshobson/agents:code-review-excellence
- trailofbits/skills:differential-review
market_position: commodity
tags:
- code-review
