name: tidy-repo
status: validated
primary_use: Audit repository structure in one pass — detect misplaced files, naming
  inconsistencies, empty directories, stale artifacts, root directory categorization
  issues, and timestamp policy violations; produce a prioritized tidy report; optionally
  apply safe, reversible changes.
inputs:
- repository root (default: current working directory)
- optional scope filter (subdirectory or glob)
- optional mode: report-only (default) | apply-safe
outputs:
- Tidy Report (docs/calibration/repo-tidy.md; overwritten unless snapshot requested)
- findings (misplaced files, naming violations, empty dirs, stale/dead artifacts,
  duplicates)
- prioritized cleanup plan with concrete actions and effort estimates
has_output_contract: true
acceptance_criteria:
- 给定仓库根，产出 docs/calibration/repo-tidy.md 含错放文件/命名违规/空目录/过期-死文件/重复五类发现，每条含 category/path/evidence/severity/suggested_action/effort_estimate
- 产出优先清单表（rank/action/target_path/risk_level/safe_to_auto_apply）；可选地仅在用户批准下应用 safe_to_auto_apply=true 的变更
overlaps_with:
- nesnilnehc/ai-cortex:assess-docs
- nesnilnehc/ai-cortex:review-codebase
- nesnilnehc/ai-cortex:align-planning
market_position: differentiated
tags:
- repository
- workflow
- cleanup
- structure
version: 1.2.0
