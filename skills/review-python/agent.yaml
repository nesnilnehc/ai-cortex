name: review-python
status: validated
primary_use: Review Python code for language and runtime conventions — type hints,
  exceptions, async/await, context managers, dependencies, and testability. Language-only
  atomic skill; output is a findings list.
inputs:
- code scope (files or directories or diff containing Python code)
outputs:
- findings list (Location, Category=language-python, Severity, Title, Description, Suggestion)
has_output_contract: true
acceptance_criteria:
- 给定 Python 代码范围，产出 findings 列表，每条含 Location/Category=language-python/Severity/Title/Description/Suggestion
- 聚焦 type hints、exceptions、async/await、context managers、依赖与 testability
overlaps_with:
- nesnilnehc/ai-cortex:review-codebase
- nesnilnehc/ai-cortex:review-code
- nesnilnehc/ai-cortex:review-diff
market_position: differentiated
tags:
- code-review
