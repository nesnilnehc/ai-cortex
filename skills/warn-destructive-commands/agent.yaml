name: warn-destructive-commands
status: experimental

primary_use: Warn before destructive commands. Checks Bash commands for rm -rf, DROP TABLE, force-push, git reset --hard, kubectl delete, and similar patterns. User can override each warning. Use when touching prod or in shared environments.

inputs:
  - session context (skill activates advisory behavior for the session)

outputs:
  - warning prompts when destructive patterns detected
  - user confirmation or cancel

