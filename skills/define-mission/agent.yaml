name: define-mission
status: validated
primary_use: Define the fundamental purpose of a project or organization; produce
  a single mission statement (1–3 sentences) answering "Why does this exist?" and
  persist to docs/project-overview/mission.md (or project norms).
cognitive_mode: interpretive
inputs:
- project or product identifier; current "why we exist" from docs, README, or user
- optional existing mission draft, audience, problem statement
outputs:
- mission statement document (docs/project-overview/mission.md or project norms)
scores:
  agent_native: 5
  cognitive: 4
  composability: 4
  stance: 5
asqm_quality: 18
overlaps_with:
- nesnilnehc/ai-cortex:define-vision
- nesnilnehc/ai-cortex:bootstrap-docs
market_position: differentiated
tags:
- documentation
- workflow
validation_gates:
  gate_a:
    name: Agent-ready
    requirement: agent_native >= 4
    status: pass
  gate_b:
    name: Design integrity
    requirement: stance >= 3
    status: pass
