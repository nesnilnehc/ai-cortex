name: define-mission
status: validated

primary_use: Define the fundamental purpose of a project or organization; produce a single mission statement (1–3 sentences) answering "Why does this exist?" and persist to docs/project-overview/mission.md (or project norms).

inputs:
  - project or product identifier; current "why we exist" from docs, README, or user
  - optional existing mission draft, audience, problem statement

outputs:
  - mission statement document (docs/project-overview/mission.md or project norms)

scores:
  agent_native: 5
  cognitive: 5
  composability: 5
  stance: 5

asqm_quality: 20

overlaps_with:
