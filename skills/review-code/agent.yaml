name: review-code
status: validated
primary_use: Orchestrator that runs scope → language → framework → library → cognitive
  review skills in order and aggregates all findings into one report. Does not perform
  analysis itself.
cognitive_mode: interpretive
inputs:
- user intent (full review vs scope/language/framework/cognitive)
- code scope (diff or paths) when known
outputs:
- single aggregated report (findings in standard format: Location, Category, Severity,
    Title, Description, Suggestion)
scores:
  agent_native: 5
  cognitive: 4
  composability: 4
  stance: 5
asqm_quality: 18
overlaps_with:
- nesnilnehc/ai-cortex:review-diff
- nesnilnehc/ai-cortex:review-codebase
- wshobson/agents:code-review-excellence
- secondsky/claude-skills:code-review
- trailofbits/skills:differential-review
- cxuu/golang-skills:go-code-review
- obra/superpowers:requesting-code-review
- skillcreatorai/Ai-Agent-Skills:code-review
market_position: differentiated
tags:
- code-review
validation_gates:
  gate_a:
    name: Agent-ready
    requirement: agent_native >= 4
    status: pass
  gate_b:
    name: Design integrity
    requirement: stance >= 3
    status: pass
