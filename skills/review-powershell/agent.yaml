name: review-powershell
status: validated
primary_use: Review PowerShell code for language and runtime conventions — advanced
  functions, parameter design, error handling, object pipeline behavior, compatibility,
  and testability. Language-only atomic skill; output is a findings list.
inputs:
- code scope (files or directories or diff containing PowerShell code)
outputs:
- findings list (Location, Category=language-powershell, Severity, Title, Description, Suggestion)
has_output_contract: true
acceptance_criteria:
- 给定 PowerShell 代码范围，产出 findings 列表，每条含 Location/Category=language-powershell/Severity/Title/Description/Suggestion
- 聚焦 advanced functions、参数设计、错误处理、object pipeline、兼容性与 testability
overlaps_with:
- nesnilnehc/ai-cortex:review-codebase
- nesnilnehc/ai-cortex:review-code
- nesnilnehc/ai-cortex:review-diff
market_position: differentiated
tags:
- code-review
