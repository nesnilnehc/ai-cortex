name: review-java
status: validated
primary_use: Review Java code for language and runtime conventions — concurrency, exceptions,
  try-with-resources, API versioning, collections and Streams, NIO, and testability.
  Language-only atomic skill; output is a findings list.
inputs:
- code scope (files or directories or diff containing Java code)
outputs:
- findings list (Location, Category=language-java, Severity, Title, Description, Suggestion)
has_output_contract: true
acceptance_criteria:
- 给定 Java 代码范围，产出 findings 列表，每条含 Location/Category=language-java/Severity/Title/Description/Suggestion
- 聚焦 concurrency、exceptions、try-with-resources、API versioning、collections/Streams、NIO 与 testability
overlaps_with:
- nesnilnehc/ai-cortex:review-codebase
- nesnilnehc/ai-cortex:review-code
- nesnilnehc/ai-cortex:review-diff
market_position: differentiated
tags:
