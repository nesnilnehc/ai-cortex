name: review-codebase
status: validated
primary_use: Architecture and design review for specified files/dirs/repo; covers
  tech debt, patterns, quality; complements review-code (diff-focused).
inputs:
- paths (file(s), dir(s), or repo root)
- optional focus (e.g. security only)
outputs:
- per-file or per-module conclusions and suggestions (with file:line)
has_output_contract: true
acceptance_criteria:
- 给定文件/目录/仓库范围，产出 per-file 或 per-module 结论与建议，每条带 file:line 引用
- 聚焦架构与设计、技术债、模式与质量；不替代 review-diff 的纯 diff 评审
overlaps_with:
- nesnilnehc/ai-cortex:review-code
- wshobson/agents:code-review-excellence
- secondsky/claude-skills:code-review
- trailofbits/skills:differential-review
- cxuu/golang-skills:go-code-review
- obra/superpowers:requesting-code-review
- skillcreatorai/Ai-Agent-Skills:code-review
market_position: commodity
tags:
- code-review
