name: analyze-requirements
status: validated
primary_use: Transform vague intent or incomplete requirements into validated, testable
  requirements through diagnostic state progression and structured dialogue.
inputs:
- Vague idea, feature request, problem statement, or existing requirements document
- Project context (existing codebase, documentation, constraints)
- User responses (diagnostic answers, feedback, approval)
- Optional upstream_ref (parent artifact path for colocation/parent-pointer modes)
- Optional artifact_norms_path override
outputs:
- Validated requirements document at norms-resolved path (default docs/requirements/<slug>.md)
- parent frontmatter field when upstream_ref provided
- Integration map (handoff data for design-solution)
has_output_contract: true
acceptance_criteria:
- 给定模糊意图或不完整需求，产出 Validated Requirements Document 至 norms-resolved 路径（默认 docs/requirements/<slug>.md），front-matter 含 artifact_type=requirements 与 created_by=analyze-requirements
- 需求层级中每条含 id/statement/acceptance_criteria（可观察可测试）/priority（must/should/could/won-t）
- 文档末尾含集成地图（upstream sources / downstream skills / handoff fields），供 design-solution 直接消费
overlaps_with: []
market_position: differentiated
