name: define-north-star
status: validated
primary_use: Define the single most important metric (North Star Metric) representing
  core value delivered to users; produce NSM with rationale, optional supporting metrics,
  and anti-examples; persist to docs/project-overview/north-star.md (or project norms).
inputs:
- project/product description; target users; core value proposition (or mission/vision)
- optional current metrics, constraints, comparable examples
outputs:
- North Star document (docs/project-overview/north-star.md or project norms): NSM,
    rationale, optional 3–5 supporting metrics, anti–North-Star examples
has_output_contract: true
acceptance_criteria:
- 产出 docs/project-overview/north-star.md，含 NSM 定义（name/formula/unit/target/cadence）、3-5 条支撑指标表（含 leading/lagging 标注与阈值）、≥2 条反 NSM 示例
- NSM 必须有 data_source 指向；缺失时显式标记 status=needs_data_source
overlaps_with:
- nesnilnehc/ai-cortex:define-mission
- nesnilnehc/ai-cortex:define-vision
- nesnilnehc/ai-cortex:design-strategic-goals
- nesnilnehc/ai-cortex:align-planning
market_position: differentiated
tags:
- documentation
- workflow
