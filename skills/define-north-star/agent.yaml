name: define-north-star
status: validated

primary_use: Define the single most important metric (North Star Metric) representing core value delivered to users; produce NSM with rationale, optional supporting metrics, and anti-examples; persist to docs/project-overview/north-star.md (or project norms).

inputs:
  - project/product description; target users; core value proposition (or mission/vision)
  - optional current metrics, constraints, comparable examples

outputs:
  - North Star document (docs/project-overview/north-star.md or project norms): NSM, rationale, optional 3–5 supporting metrics, anti–North-Star examples

