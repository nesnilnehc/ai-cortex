name: discover-docs-norms
status: validated
primary_use: Discover and propose project-specific docs norms from repository evidence;
  output proposal only, never writes ARTIFACT_NORMS directly; focuses on path/naming/
  front-matter/lifecycle norms; linking convention inferred by downstream tools.
inputs:
- project path (default CWD)
- optional docs root
- optional confidence threshold
outputs:
- docs/calibration/docs-norms-proposal.md
has_output_contract: true
acceptance_criteria:
- 给定项目 docs 根，扫描既有结构后产出 docs/calibration/docs-norms-proposal.md 含提议规则表（rule_kind/pattern/evidence_files/confidence）
- 不写入 ARTIFACT_NORMS.md 本体；含「与现状差异」清单评估变更代价
overlaps_with:
- nesnilnehc/ai-cortex:define-docs-norms
- nesnilnehc/ai-cortex:assess-docs
market_position: differentiated
tags:
- documentation
- workflow
version: 4.0.0
