name: discover-docs-norms
status: validated
primary_use: Discover and propose project-specific docs norms from repository evidence;
  output proposal only and never write ARTIFACT_NORMS directly. v4.0 retracts v3.0's
  Stage 2b Linking Mode Identification (see ADR 005) — linking mode is no longer a
  runtime config field. Skill now focuses on path/naming/front-matter/lifecycle norms
  discovery only; linking convention is inferred by downstream tools from path_pattern
  declarations and physical file signals (manifest presence, parent: frontmatter).
cognitive_mode: interpretive
inputs:
- project path (default CWD)
- optional docs root
- optional confidence threshold
outputs:
- docs/calibration/docs-norms-proposal.md (proposal report; linking mode section retracted in v4.0)
scores:
  agent_native: 5
  cognitive: 4
  composability: 5
  stance: 5
asqm_quality: 19
overlaps_with:
- nesnilnehc/ai-cortex:define-docs-norms
- nesnilnehc/ai-cortex:assess-docs
market_position: differentiated
tags:
- documentation
- workflow
version: 4.0.0
validation_gates:
  gate_a:
    name: Agent-ready
    requirement: agent_native >= 4
    status: pass
  gate_b:
    name: Design integrity
    requirement: stance >= 3
    status: pass
