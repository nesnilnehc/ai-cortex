name: define-vision
status: validated
primary_use: Define the long-term future the project aims to create; produce a vision
  statement (1–3 sentences) aligned with mission and persist to docs/project-overview/vision.md
  (or project norms).
cognitive_mode: interpretive
inputs:
- mission (statement or path); project/product context
- optional existing vision draft, time horizon, audience
outputs:
- vision statement document (docs/project-overview/vision.md or project norms)
scores:
  agent_native: 5
  cognitive: 4
  composability: 4
  stance: 5
asqm_quality: 18
overlaps_with:
- nesnilnehc/ai-cortex:define-mission
- nesnilnehc/ai-cortex:define-north-star
- nesnilnehc/ai-cortex:bootstrap-docs
market_position: differentiated
tags:
- documentation
- workflow
validation_gates:
  gate_a:
    name: Agent-ready
    requirement: agent_native >= 4
    status: pass
  gate_b:
    name: Design integrity
    requirement: stance >= 3
    status: pass
