name: install-rules
status: validated
primary_use: Install rules from a source repository into Cursor (.cursor/rules/) or
  Trae IDE (.trae/project_rules.md) with explicit user confirmation and conflict detection
  before any write.
inputs:
- source (this project rules/ or Git repo owner/repo, optional branch/ref and subpath)
- target IDE (Cursor | Trae)
- scope (all rules or subset by name)
- destination (project-level or user-level; default project-level)
outputs:
- rule files written to IDE-specific destination (.cursor/rules/*.mdc or .trae managed
  block)
- post-install summary (executed actions, target paths, conversion notes or failures)
has_output_contract: true
acceptance_criteria:
- 给定 source 与目标 IDE（Cursor/Trae），先列出将写入文件路径并请求用户确认，再写入
- 产出 post-install summary 含 executed actions/target paths/conversion notes/failures，冲突时不静默覆盖
overlaps_with:
- nesnilnehc/ai-cortex:discover-skills
market_position: experimental
tags:
- automation
- infrastructure
