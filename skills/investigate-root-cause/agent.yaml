name: investigate-root-cause
status: validated

primary_use: Systematic root-cause debugging. Four phases: investigate, analyze, hypothesize, implement. Iron Law: no fixes without root cause. Use when asked to "debug this", "fix this bug", or "root cause analysis".

inputs:
  - error messages, stack traces, reproduction steps
  - optional affected file paths

outputs:
  - root cause hypothesis and verification process
  - minimal fix and regression test
  - structured Debug Report (symptom, root cause, fix, evidence, status)

