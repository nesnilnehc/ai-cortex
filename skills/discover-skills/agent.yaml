name: discover-skills
status: experimental
primary_use: Identify missing skills and recommend installations from AI Cortex or
  public catalogs; suggest install commands without auto-installing.
cognitive_mode: interpretive
inputs:
- current task description
- optional list of installed skills
- optional allowed sources (local vs public)
outputs:
- recommended skills with rationale
- install commands for each
scores:
  agent_native: 4
  cognitive: 4
  composability: 3
  stance: 4
asqm_quality: 15
overlaps_with:
- nesnilnehc/ai-cortex:refine-skill-design
market_position: differentiated
tags:
- automation
- infrastructure
- generalization
validation_gates:
  gate_a:
    name: Agent-ready
    requirement: agent_native >= 4
    status: pass
  gate_b:
    name: Design integrity
    requirement: stance >= 3
    status: pass
