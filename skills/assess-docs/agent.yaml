name: assess-docs
status: validated
primary_use: Assess documentation core health (norm compliance + readiness + minimum fill plan).
inputs:
- project docs scope
- optional layer mapping
- optional target readiness level
outputs:
- docs/calibration/doc-assessment.md
has_output_contract: true
acceptance_criteria:
- 给定项目 docs 根，产出 docs/calibration/doc-assessment.md，含规范合规列表（rule_id/artifact_path/status/evidence）、分层就绪度评分表（layer/score 0-3/missing_artifacts/next_action）、最小补全计划
- 当 ARTIFACT_NORMS.md 缺失时显式标记 norms_source=fallback 并使用 specs/artifact-contract.md 的默认值
overlaps_with:
- nesnilnehc/ai-cortex:assess-docs-code-alignment
- nesnilnehc/ai-cortex:assess-docs-links
- nesnilnehc/ai-cortex:assess-docs-ssot
market_position: differentiated
tags:
- documentation
- workflow
- governance
version: 4.0.0
