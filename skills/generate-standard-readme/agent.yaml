name: generate-standard-readme
status: validated
primary_use: Create governance-focused README with fixed structure and output contract
  for asset governance, audit, or standardized first-impression docs.
inputs:
- project metadata (name, description)
- features, requirements, install/run commands
outputs:
- README Markdown (title, badges, description, features, installation, quick start,
  usage, contributing, license, authors)
has_output_contract: true
acceptance_criteria:
- 产出 README Markdown 含固定结构：title/badges/description/features/installation/quick start/usage/contributing/license/authors
- 所有占位章节必须基于输入元数据填充实质内容，禁止保留 lorem 或空段
overlaps_with:
- nesnilnehc/ai-cortex:decontextualize-text
- nesnilnehc/ai-cortex:generate-agent-entry
market_position: commodity
tags:
- documentation
- devops
- writing
