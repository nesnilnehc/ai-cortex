name: generate-standard-readme
status: validated
primary_use: Generate lean, high-density README with sections pruned by value threshold.
  Primary goal — reader knows what the project is, where to look, and how to use it
  within 30 seconds. Adapts to project type (code vs doc repo).
inputs:
- project name and one-line description
- project type (code or doc; inferred from repo structure if omitted)
- license type and path (optional; TBD if not provided)
- install commands and quick-start example (code repos only, optional)
- core entry points (key files, directories, URLs)
outputs:
- README.md with sections determined by value threshold (minimum 3 sections; no fixed count)
has_output_contract: true
acceptance_criteria:
- 陌生读者 30 秒内能识别项目类型并找到使用入口
- 每个存在的章节通过价值门槛判定（能提供其他章节不含的新决策信息）
- 许可证节存在且含有效内部链接（或 TBD）
- 无臆造内容：所有命令/路径均来自输入，未提供的用 TBD 或省略
- 无空泛形容词：每个主张落到具体路径、命令、行为或约束
- doc 类型仓库不含安装/快速启动节；code 类型的安装命令实际可执行
overlaps_with:
- nesnilnehc/ai-cortex:decontextualize-text
- nesnilnehc/ai-cortex:generate-agent-entry
market_position: commodity
tags:
- documentation
- devops
- writing
