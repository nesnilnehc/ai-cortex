name: define-strategic-pillars
status: validated
primary_use: Derive 3–5 strategic pillars from vision and North Star; produce a pillars
  document to structure goals and roadmap; persist to docs/project-overview/strategic-pillars.md
  (or project norms).
inputs:
- vision; North Star (or paths); project context
- optional mission; existing goals or pillars
outputs:
- strategic pillars document (docs/project-overview/strategic-pillars.md): 3–5 pillars
    with alignment to vision/NSM
has_output_contract: true
acceptance_criteria:
- 产出 docs/project-overview/strategic-pillars.md，含 3-5 条支柱（id/name/description/aligns_with_vision/aligns_with_nsm）
- 含与 vision/NSM 的对齐矩阵（pillar_id × (vision/nsm) → strong/medium/weak）
overlaps_with:
- nesnilnehc/ai-cortex:define-vision
- nesnilnehc/ai-cortex:define-north-star
- nesnilnehc/ai-cortex:design-strategic-goals
- nesnilnehc/ai-cortex:define-roadmap
market_position: differentiated
tags:
- documentation
- workflow
