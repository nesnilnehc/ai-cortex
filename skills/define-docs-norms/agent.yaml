name: define-docs-norms
status: validated
primary_use: Create or update docs/ARTIFACT_NORMS.md from an approved norms proposal.
  v2.0 adds Stage 1b "Linking Mode Selection" — presents the 6 fixed enums from
  specs/linking-modes.md (slug / colocation / parent-pointer / manifest / mixed /
  none) to the user with discover-docs-norms recommendation ranking, asks mixed
  sub-questions (primary + secondary scope), writes structured linking_mode field
  to docs/ARTIFACT_NORMS.md per specs/artifact-norms-schema.md §6. Non-interactive
  callers may pass linking_mode_override to bypass UI.
cognitive_mode: interpretive
inputs:
- approved norms proposal (may contain Linking Mode section with candidates)
- optional existing docs/ARTIFACT_NORMS.md
- optional merge strategy
- optional linking_mode_override (bypass interactive selection)
outputs:
- docs/ARTIFACT_NORMS.md (with Linking Mode section per v2.0)
- change summary
scores:
  agent_native: 5
  cognitive: 4
  composability: 4
  stance: 5
asqm_quality: 18
overlaps_with:
- nesnilnehc/ai-cortex:discover-docs-norms
- nesnilnehc/ai-cortex:assess-docs
market_position: differentiated
tags:
- documentation
- workflow
version: 2.0.0
validation_gates:
  gate_a:
    name: Agent-ready
    requirement: agent_native >= 4
    status: pass
  gate_b:
    name: Design integrity
    requirement: stance >= 3
    status: pass
