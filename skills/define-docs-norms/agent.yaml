name: define-docs-norms
status: validated
primary_use: Create or update docs/ARTIFACT_NORMS.md from an approved norms proposal.
  Writes path_pattern / naming / front-matter / lifecycle norms;
  project linking conventions are expressed via path_pattern overrides or physical
  manifest files.
inputs:
- approved norms proposal
- optional existing docs/ARTIFACT_NORMS.md
- optional merge strategy
outputs:
- docs/ARTIFACT_NORMS.md
- change summary
has_output_contract: true
acceptance_criteria:
- 给定已批准提案，写入 docs/ARTIFACT_NORMS.md，front-matter 含 artifact_type=norms/lifecycle=living；正文含路径规则/命名规则/生命周期规则三表
- 末尾产出 change summary 含 added/modified/removed 三组规则项与 commit message 建议
overlaps_with:
- nesnilnehc/ai-cortex:discover-docs-norms
- nesnilnehc/ai-cortex:assess-docs
market_position: differentiated
tags:
- documentation
- workflow
version: 3.0.0
