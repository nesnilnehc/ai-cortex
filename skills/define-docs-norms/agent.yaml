name: define-docs-norms
status: validated
primary_use: Create or update docs/ARTIFACT_NORMS.md from an approved norms proposal.
  v3.0 retracts v2.0's Stage 1b Linking Mode Selection UI (see ADR 005) — linking
  mode is no longer a runtime config field. Skill now writes path_pattern / naming /
  front-matter / lifecycle norms only; linking convention is expressed via path_pattern
  overrides or physical manifest files, not a linking_mode enum.
cognitive_mode: interpretive
inputs:
- approved norms proposal
- optional existing docs/ARTIFACT_NORMS.md
- optional merge strategy
outputs:
- docs/ARTIFACT_NORMS.md
- change summary
scores:
  agent_native: 5
  cognitive: 4
  composability: 4
  stance: 5
asqm_quality: 18
overlaps_with:
- nesnilnehc/ai-cortex:discover-docs-norms
- nesnilnehc/ai-cortex:assess-docs
market_position: differentiated
tags:
- documentation
- workflow
version: 3.0.0
validation_gates:
  gate_a:
    name: Agent-ready
    requirement: agent_native >= 4
    status: pass
  gate_b:
    name: Design integrity
    requirement: stance >= 3
    status: pass
