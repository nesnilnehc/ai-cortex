name: commit-work
status: validated
primary_use: Create high-quality git commits with governance - review, split logically,
  write clear Conventional Commits messages, sync registries
inputs:
- git repository with uncommitted changes
- user intent (what to commit)
- commit style preferences (optional)
- project-specific rules (optional)
outputs:
- commit message(s) with type, scope, description
- summary per commit (what/why)
- commands used for staging and review
- verification commands run
- registry sync confirmation (AI Cortex projects)
has_output_contract: true
acceptance_criteria:
- 给定带未提交变更的仓库，产出 1+ 条 Conventional Commits 格式 commit，每条含 type/scope/description 与 what/why summary
- 输出执行过的暂存与审查命令清单；AI Cortex 项目须含 manifest.json 与 INDEX 注册表同步确认
overlaps_with:
- anthropics/skills:commit-work
- softaworks/agent-toolkit:commit-work
market_position: differentiated
