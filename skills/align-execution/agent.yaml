name: align-execution
status: validated

primary_use: Perform post-task traceback, typed drift detection, and top-down recalibration to keep execution aligned with goals, requirements, milestones, and roadmap (planning layer only).

inputs:
  - completed task description and outcome
  - optional mode override (lightweight | full)
  - optional document root and path mapping
  - optional context (release, milestone, epic markers)

outputs:
  - Execution Alignment Report (docs/calibration/YYYY-MM-DD-task-slug-calibration.md)
  - machine-readable drifts and evidence readiness block

scores:
  agent_native: 5
  cognitive: 5
  composability: 5
  stance: 5

asqm_quality: 20

