name: validate-document-artifacts
status: validated

primary_use: Validate docs against project artifact norms; output findings list for path, naming, and front-matter compliance.

inputs:
  - project path
  - optional docs root (default docs/)
  - optional scope (all or specific artifact_type)

outputs:
  - findings list (Location, Category, Severity, Title, Description, Suggestion)
  - summary (files scanned, violations by severity)

scores:
  agent_native: 5
  cognitive: 4
  composability: 4
  stance: 5

asqm_quality: 18

overlaps_with:
  - nesnilnehc/ai-cortex:assess-documentation-readiness
  - nesnilnehc/ai-cortex:curate-skills

market_position: differentiated

tags: [documentation, eng-standards, workflow]
