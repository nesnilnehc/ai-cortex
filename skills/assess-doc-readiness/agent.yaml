name: assess-doc-readiness
status: validated

primary_use: Assess documentation evidence readiness across project layers, prioritize gaps, and produce a minimum-fill plan for reliable AI-assisted governance.

inputs:
  - project docs scope
  - optional layer path mapping
  - optional target readiness level (medium | high)

outputs:
  - Documentation Readiness Report (docs/calibration/doc-readiness.md; overwritten unless snapshot requested)
  - minimal fill plan with layer readiness and gap priority list

scores:
  agent_native: 5
  cognitive: 4
  composability: 5
  stance: 5

asqm_quality: 19

overlaps_with:
  - nesnilnehc/ai-cortex:bootstrap-docs
  - nesnilnehc/ai-cortex:align-planning
  - nesnilnehc/ai-cortex:run-checkpoint

market_position: differentiated

tags: [documentation, eng-standards, workflow]
