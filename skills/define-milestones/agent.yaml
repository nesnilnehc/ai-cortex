name: define-milestones
status: validated

primary_use: Break strategic goals into concrete phase checkpoints (milestones); produce a milestones document with traceability to goals and persist to docs/process-management/milestones.md (or project norms).

inputs:
  - strategic goals (document or path); project context
  - optional vision/NSM; existing roadmap or phases; time constraints

outputs:
  - milestones document (docs/process-management/milestones.md or project norms): list of milestones with goal mapping

