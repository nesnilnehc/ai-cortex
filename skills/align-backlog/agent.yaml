name: align-backlog
status: validated
primary_use: Align the product or work backlog with current strategy, goals, and roadmap;
  classify items (aligned/partial/misaligned/orphan); produce actionable change proposals
  (add/cut/merge/reprioritize) and persist a Backlog Alignment Report. v1.1 adds
  Stage 0 Norms Resolution per artifact-contract §8 — project norms override
  path_pattern; fixed-path governance output.
cognitive_mode: interpretive
inputs:
- optional backlog path or convention
- optional strategy docs root (goals, roadmap, milestones)
- optional scope (full vs subset by epic/label/time window)
outputs:
- Backlog Alignment Report (docs/calibration/backlog-alignment.md; living)
- machine-readable alignment summary and change proposals block (YAML)
scores:
  agent_native: 4
  cognitive: 4
  composability: 4
  stance: 5
asqm_quality: 17
overlaps_with:
- nesnilnehc/ai-cortex:align-planning
- nesnilnehc/ai-cortex:plan-next
- nesnilnehc/ai-cortex:capture-work-items
market_position: differentiated
tags:
- workflow
- documentation
validation_gates:
  gate_a:
    name: Agent-ready
    requirement: agent_native >= 4
    status: pass
  gate_b:
    name: Design integrity
    requirement: stance >= 3
    status: pass
