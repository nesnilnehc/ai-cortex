name: assess-docs-code-alignment
status: validated
primary_use: Assess whether code changes are accompanied by required docs updates.
inputs:
- code diff range
- optional mapping rules
outputs:
- docs/calibration/code-doc-alignment.md
has_output_contract: true
acceptance_criteria:
- 给定代码 diff 范围与 docs 根，产出 docs/calibration/code-doc-alignment.md，含 alignment_gaps 列表，每条含 category（api_drift/config_drift/behavior_drift/removed_feature）/code_location/doc_location/evidence/suggested_update
- 产出 alignment_gaps YAML 块供 plan-next 消费
overlaps_with:
- nesnilnehc/ai-cortex:assess-docs
market_position: differentiated
tags:
- documentation
- workflow
- governance
version: 1.0.0
