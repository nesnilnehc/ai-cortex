name: capture-work-items
status: validated
primary_use: Capture requirements, bugs, or issues from free-form input into structured,
  persistent backlog artifacts with path detection, status lifecycle, required strategic_goal_id,
  and priority=unset awaiting batch scoring by prioritize-backlog.
inputs:
- raw description of requirement, bug, or issue from user
- optional project context (docs/ structure for path detection)
outputs:
- structured work item Markdown (docs/process-management/project-board/backlog/ or
  docs/backlog/ per path detection, specs/artifact-contract.md)
- YAML front-matter with type, date, status (captured), priority (unset), strategic_goal_id,
  source, severity (bugs)
- end-of-capture suggestion (not auto-execute) to run prioritize-backlog when unscored
  backlog items accumulate
has_output_contract: true
acceptance_criteria:
- 给定原始描述，产出结构化 Markdown work item，front-matter 含 type/date/status=captured/priority=unset/strategic_goal_id/source（bug 类含 severity）
- 路径按检测结果落盘到 docs/process-management/project-board/backlog/ 或 docs/backlog/，遵循 specs/artifact-contract.md
- 末尾输出建议（不自动执行）：当未评分 backlog 累积时提示运行 prioritize-backlog
overlaps_with:
- nesnilnehc/ai-cortex:analyze-requirements
- nesnilnehc/ai-cortex:design-solution
market_position: differentiated
tags:
- writing
- documentation
- workflow
