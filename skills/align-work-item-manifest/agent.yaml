name: align-work-item-manifest
status: validated
primary_use: Detect drift between project work-item manifest files and the physical
  artifacts they register (requirements / designs / tasks / PRs); advisory-only —
  reports dangling references, unregistered files, and name mismatches; output
  consumable by plan-next as G3 drift source.
inputs:
- project path (default CWD)
- optional manifest glob pattern (default from ARTIFACT_NORMS.md)
- optional artifact_norms_path override
outputs:
- docs/calibration/work-item-manifest-alignment.md (alignment report with three drift categories)
- machine-readable drift summary embedded as YAML fence for plan-next consumption
has_output_contract: true
acceptance_criteria:
- 给定 manifest 文件与物理 artifact 树，产出 alignment 报告含 registered_missing/unregistered_present/metadata_mismatch 三类漂移分组
- 所有条目仅作为 advisory 输出 proposed_action，不直接修改 manifest 或 artifact
- 产出 drift_summary YAML 块含 counts 与 items[]，供 plan-next 消费
overlaps_with:
- nesnilnehc/ai-cortex:align-planning
- nesnilnehc/ai-cortex:tidy-repo
market_position: differentiated
tags:
- workflow
- documentation
- governance
- alignment
version: 1.0.0
