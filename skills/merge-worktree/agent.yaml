name: merge-worktree
status: validated
primary_use: From the main repo, scan all active worktrees, let user select which to merge, run batch merge+push sequentially, then unified cleanup
inputs:
- main git repository (CWD must be main repo, not a linked worktree)
- one or more active linked worktrees with named branches
- user selection of which worktrees to merge (all or index-based subset)
- clean working tree per selected worktree (pre-flight verified for all before any merge)
outputs:
- no-ff merge commits on main branch (one per succeeded worktree)
- origin remote updated via git push (one push per succeeded worktree)
- worktrees removed for all succeeded merges (unified cleanup)
- feature branches deleted for user-confirmed entries (safe -d only)
- per-worktree batch summary report (merge/push/cleanup/branch-del status)
has_output_contract: true
acceptance_criteria:
- 从主仓库 CWD 启动，扫描 git worktree list 后呈现非主条目供用户选择；预检每个选中 worktree 的 git status --porcelain 后再开始任何 merge
- 产出批量摘要表，每行含 Worktree/Branch/Merge/Push/Cleanup/Branch 状态码（如 ✓/skipped(dirty)/✗(conflict)）
- 失败/冲突 worktree 不进入 cleanup；禁用 --force 与 -D，全程仅 -d
overlaps_with: []
market_position: differentiated
