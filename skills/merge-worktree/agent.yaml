name: merge-worktree
status: experimental

primary_use: Merge current worktree branch into main, push to origin, and remove the worktree safely with ordered safety checks

inputs:
  - active git worktree with a named branch
  - clean working tree (no uncommitted changes)
  - main branch name (auto-detected or user-provided)

outputs:
  - no-ff merge commit on main branch
  - origin remote updated via git push
  - worktree directory removed from git worktree list
  - feature branch deleted (optional, user-confirmed)
  - outcome summary report (branch, commit hash, push status, worktree path)

scores:
  agent_native: 4
  cognitive: 4
  composability: 4
  stance: 4

asqm_quality: 16

lifecycle_state: Experimental

overlaps_with: []

market_position: differentiated

validation_gates:
  gate_a:
    name: Agent-ready
    requirement: agent_native >= 4
    status: pass
  gate_b:
    name: Design integrity
    requirement: stance >= 3
    status: pass
