name: merge-worktree
status: validated
primary_use: Merge current worktree branch into main, push to origin, and remove the worktree safely with CWD-safe cleanup
cognitive_mode: procedural
inputs:
- active git worktree with a named branch
- clean working tree (no uncommitted changes)
- main branch name (auto-detected or user-provided)
outputs:
- no-ff merge commit on main branch
- origin remote updated via git push
- worktree directory removed from git worktree list
- feature branch deleted (optional, user-confirmed)
- outcome summary report (branch, commit hash, push status, worktree path)
