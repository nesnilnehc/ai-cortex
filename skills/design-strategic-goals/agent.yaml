name: design-strategic-goals
status: validated
primary_use: Define 3–5 long-term strategic goals that move the project toward the
  vision and North Star; long-term projects (>6 months) must include an engineering/governance
  health goal per ADR 20260417; produce outcome-focused goals document and persist to
  docs/project-overview/strategic-goals.md (or project norms).
inputs:
- vision; North Star (or paths); project context
- optional mission; time horizon; existing goals or priorities
outputs:
- strategic goals document (docs/project-overview/strategic-goals.md or project norms): 3–5
    goals, optional alignment notes
has_output_contract: true
acceptance_criteria:
- 产出 docs/project-overview/strategic-goals.md，含 3-5 条目标（id/name/outcome_statement/acceptance/status/aligns_with_pillar）
- 每条目标的 acceptance 含 KPI name/threshold/data_source；data_source 缺失须在 status 标注
overlaps_with:
- nesnilnehc/ai-cortex:define-mission
- nesnilnehc/ai-cortex:define-vision
- nesnilnehc/ai-cortex:define-north-star
- nesnilnehc/ai-cortex:define-strategic-pillars
- nesnilnehc/ai-cortex:define-roadmap
- nesnilnehc/ai-cortex:align-planning
market_position: differentiated
tags:
- documentation
- workflow
