name: automate-tests
status: validated
primary_use: Analyze how a repo expects automated tests to run (docs/CI/build manifests)
  and execute the safest appropriate test command(s) with explicit confirmation for
  installs/services.
inputs:
- target repository path (default .)
- mode (fast | ci | full)
- constraints (allow dependency install, allow network, allow Docker)
outputs:
- test plan summary (evidence, chosen commands, assumptions, executed vs skipped)
- execution results (first failing command + exit code + error excerpt when failing)
has_output_contract: true
acceptance_criteria:
- 给定目标仓库与 mode（fast/ci/full），先输出 test plan summary（evidence/chosen commands/assumptions），再执行测试
- 执行结果含 first failing command + exit code + error excerpt（失败时）；安装/启服务前必须显式确认
overlaps_with: []
market_position: commodity
tags:
- automation
- devops
