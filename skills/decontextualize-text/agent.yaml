name: decontextualize-text
status: experimental
primary_use: Convert text with private context or internal dependencies into generic,
  unbiased expressions for methodology abstraction, cross-team sharing, anonymization,
  or public release.
cognitive_mode: interpretive
inputs:
- text with org/company/project names, internal conventions, environment-specific
  details
outputs:
- generic version (logic preserved, reusable without extra context)
scores:
  agent_native: 4
  cognitive: 4
  composability: 4
  stance: 4
asqm_quality: 16
overlaps_with:
- nesnilnehc/ai-cortex:generate-standard-readme
market_position: differentiated
tags:
- writing
- security
- privacy
- generalization
validation_gates:
  gate_a:
    name: Agent-ready
    requirement: agent_native >= 4
    status: pass
  gate_b:
    name: Design integrity
    requirement: stance >= 3
    status: pass
