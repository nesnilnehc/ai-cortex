name: integrate-worktrees
status: validated
primary_use: From the main repo on the main branch, scan all linked worktrees, multi-select with the user, run sequential merge --no-ff + push, then unified cleanup of succeeded ones
inputs:
- main git repository (CWD must be main repo root, not inside a linked worktree)
- current branch must equal the detected main branch
- one or more active linked worktrees with named branches
- user selection of which worktrees to integrate (all or index-based subset)
- clean working tree per selected worktree (pre-flight verified for all before any merge)
outputs:
- no-ff merge commits on the main branch (one per succeeded worktree)
- origin remote updated via git push (one push per succeeded worktree)
- worktrees removed for all succeeded merges (unified cleanup)
- feature branches deleted for user-confirmed entries (safe -d only)
- per-worktree batch summary report (merge/push/cleanup/branch-del status)
has_output_contract: true
acceptance_criteria:
- 在主仓库根 + main 分支调用，扫描 git worktree list --porcelain 后呈现非主条目供用户多选；预检每个选中 worktree 的 git status --porcelain 后再开始任何 merge
- 产出批量摘要表，每行含 Worktree/Branch/Merge/Push/Cleanup/Branch 状态码（如 ✓/skipped(dirty)/✗(conflict)）
- 失败/冲突 worktree 不进入 cleanup；禁用 --force 与 -D，全程仅 -d
- 在 worktree 内调用或在主仓库非 main 分支调用 → halt 退出码非 0，不发起任何写操作；输出指明改用 deliver-feature 或先 git checkout 到 main
- 任一选中 worktree 在预检阶段为 dirty 时进入「continue/halt」决策；用户选 halt 则不发起任何 merge
overlaps_with: []
market_position: differentiated
