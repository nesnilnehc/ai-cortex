name: review-dotnet
status: validated
primary_use: Review .NET (C#/F#) code for language and runtime conventions — async/await,
  nullable, API versioning, IDisposable, LINQ, and testability. Language-only atomic
  skill; output is a findings list.
inputs:
- code scope (files or directories or diff containing .NET code)
outputs:
- findings list (Location, Category=language-dotnet, Severity, Title, Description, Suggestion)
has_output_contract: true
acceptance_criteria:
- 给定 .NET 代码范围，产出 findings 列表，每条含 Location/Category=language-dotnet/Severity/Title/Description/Suggestion
- 聚焦 async/await、nullable、API versioning、IDisposable、LINQ 与 testability
overlaps_with:
- nesnilnehc/ai-cortex:review-codebase
- nesnilnehc/ai-cortex:review-code
- nesnilnehc/ai-cortex:review-diff
market_position: differentiated
tags:
- code-review
