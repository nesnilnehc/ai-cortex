name: review-react
status: validated
primary_use: Review React for component design, hooks correctness, state management,
  rendering performance, and accessibility. Framework-only atomic skill; output is
  a findings list.
inputs:
- code scope (files or directories or diff containing React code)
outputs:
- findings list (Location, Category=framework-react, Severity, Title, Description,
  Suggestion)
has_output_contract: true
acceptance_criteria:
- 给定 React 代码范围，产出 findings 列表，每条含 Location/Category=framework-react/Severity/Title/Description/Suggestion
- 聚焦组件设计、hooks 正确性、状态管理、渲染性能与可访问性
overlaps_with:
- nesnilnehc/ai-cortex:review-codebase
- nesnilnehc/ai-cortex:review-code
- nesnilnehc/ai-cortex:review-diff
market_position: commodity
tags:
- code-review
