name: align-planning
status: validated
primary_use: Perform post-task traceback, typed drift detection, and top-down recalibration
  to keep planning (goals, requirements, milestones, roadmap) aligned with task execution.
inputs:
- completed task description and outcome
- optional mode override (lightweight | full)
- optional document root and path mapping
- optional context (release, milestone, epic markers)
outputs:
- Planning Alignment Report (docs/calibration/planning-alignment.md; overwritten unless
  snapshot requested)
- machine-readable drifts and evidence readiness block
has_output_contract: true
acceptance_criteria:
- 给定项目 docs 根，产出 Planning Alignment Report 含漂移列表，每条含 id/drift_type（goal_decoupled/requirement_orphan/roadmap_stale/task_unanchored）/artifact_path/evidence/suggested_fix
- 报告含 evidence_readiness（strong/moderate/weak）与 confidence 标量字段，弱准备度时显式列出 missing_artifacts
- 机器可读 drifts YAML 块以 plan-next 可消费的格式输出
overlaps_with:
- nesnilnehc/ai-cortex:assess-docs
- nesnilnehc/ai-cortex:plan-next
- nesnilnehc/ai-cortex:align-architecture
- nesnilnehc/ai-cortex:analyze-requirements
- nesnilnehc/ai-cortex:design-solution
market_position: differentiated
tags:
- workflow
- documentation
