name: plan-next
status: validated
cognitive_mode: interpretive
primary_use: Inventory governance inputs and produce next-action routing report.
  Strictly read-only — never executes downstream skills. Auto-iteration is composed
  externally via `loop` (scheduling) + an orchestrator skill (driving). Step 2.5
  scans Now tier downstream artifacts by direct physical signals (resolved
  path_pattern glob + optional parent: frontmatter reverse index + optional manifest
  file detection). Step 0 Norms Resolution loads ARTIFACT_NORMS.md /
  .ai-cortex/artifact-norms.yaml into cache for path_pattern overrides. Step 2.7 S5
  task scan uses cache-resolved path. Features: S5 cross-signal execution health,
  Now-tier-scoped downstream evaluation with depth-first breakdown (G1 then G3 chain),
  breakdown-tasks in What/When G1; G3 chain routing: design-solution (req↔design) /
  breakdown-tasks (design↔task).
inputs:
- trigger context
- optional scope overrides
- optional threshold overrides (commit_idle_days, drift_staleness_days, backlog_min_items, confidence_low_below, task_stuck_days)
- optional task_source, roadmap_tier_source, artifact_norms_path overrides
outputs:
- three-section user-facing report (Now do / Also watch / Diagnosis) with natural-language terms in first two sections
- internal codes (S1-S7, G1-G4, P0-P3) appear only as traceability anchors in the Diagnosis section
- routing recommendations with six fields each (theme, gap, skill, rationale, priority, stop condition)
scores:
  agent_native: 5
  cognitive: 4
  composability: 5
  stance: 5
asqm_quality: 19
overlaps_with:
- nesnilnehc/ai-cortex:assess-docs
- nesnilnehc/ai-cortex:audit-docs
market_position: differentiated
tags:
- workflow
- automation
- meta-skill
version: 9.4.0
validation_gates:
  gate_a:
    name: Agent-ready
    requirement: agent_native >= 4
    status: pass
  gate_b:
    name: Design integrity
    requirement: stance >= 3
    status: pass
