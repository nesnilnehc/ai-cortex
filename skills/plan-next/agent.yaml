name: plan-next
status: validated
cognitive_mode: interpretive
primary_use: Inventory governance inputs and produce next-action routing report. Adds v5 project state machine (S1-S7, matrix interpreter) and two-layer Primary/Secondary output per ADR 20260417. Default planning-only with execute=false.
inputs:
- trigger context
- optional scope overrides
- optional execute flag (default false)
outputs:
- structured chat output with project state label (S1-S7) and 3 sections (sources inventory, readiness verdict, prioritized next tasks)
- two-tier routing: Primary (state-focused) + Secondary (full-matrix compressed)
- routing recommendations with priority/owner/rationale
