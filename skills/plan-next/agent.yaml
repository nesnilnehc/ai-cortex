name: plan-next
status: validated
cognitive_mode: interpretive
primary_use: Inventory governance inputs and produce next-action routing report. v8.0
  retracts v7.0's linking_mode enum consumption (see ADR 005) — Step 2.5 now scans
  Now tier downstream artifacts by direct physical signals (resolved path_pattern
  glob + optional parent: frontmatter reverse index + optional manifest file
  detection) without any "mode" selection or gate route. Step 0 Norms Resolution
  still loads ARTIFACT_NORMS.md / .ai-cortex/artifact-norms.yaml into cache for
  path_pattern overrides (enabling colocation via path customization alone). Step
  2.7 S5 task scan uses cache-resolved path. v6.3/v7.0 features retained (S5 cross-
  signal execution health, Now-tier-scoped downstream evaluation with depth-first
  breakdown, breakdown-tasks in What/When G1). Default planning-only with execute=false.
inputs:
- trigger context
- optional scope overrides
- optional execute flag (default false)
- optional threshold overrides (commit_idle_days, drift_staleness_days, backlog_min_items, confidence_low_below, task_stuck_days)
- optional task_source, roadmap_tier_source, artifact_norms_path overrides
outputs:
- three-section user-facing report (Now do / Also watch / Diagnosis) with natural-language terms in first two sections
- internal codes (S1-S7, G1-G4, P0-P3) appear only as traceability anchors in the Diagnosis section
- routing recommendations with six fields each (theme, gap, skill, rationale, priority, stop condition)
scores:
  agent_native: 5
  cognitive: 4
  composability: 5
  stance: 5
asqm_quality: 19
overlaps_with:
- nesnilnehc/ai-cortex:assess-docs
- nesnilnehc/ai-cortex:audit-docs
market_position: differentiated
tags:
- workflow
- automation
- meta-skill
version: 8.0.0
validation_gates:
  gate_a:
    name: Agent-ready
    requirement: agent_native >= 4
    status: pass
  gate_b:
    name: Design integrity
    requirement: stance >= 3
    status: pass
