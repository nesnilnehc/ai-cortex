name: plan-next
status: validated
primary_use: Analyze governance state and produce a next-action routing report by
  traversing the goal chain top-down (L1 strategic goal → L5 tasks), depth-first
  to the first unready level; strictly read-only — never executes downstream skills.
inputs:
- trigger context
- optional scope overrides
- optional threshold overrides (commit_idle_days, drift_staleness_days, backlog_min_items, confidence_low_below, task_stuck_days, milestone_archive_age_days, milestone_archive_lookback)
- optional task_source, roadmap_tier_source, artifact_norms_path overrides
- optional glossary_path override (defaults to .ai-cortex/glossary.yaml then docs/glossary.md, with fallback to artifact frontmatter title)
outputs:
- three-section user-facing report (Now do / Also watch / Diagnosis) with natural-language terms in first two sections
- internal codes (G1-G4, P0-P3) appear only as traceability anchors in the collapsible Diagnosis section
- each routing card has TL;DR header (≤30 chars quote block) + 6 core fields (theme, governance_context as multi-line short-chain ≤25 chars per line, recommended_skill with invocation hint, rationale, completion_marker, priority_label) + 2 optional fields (deferral_cost, onboarding_threshold; omitted when info insufficient)
- KPI/threshold first occurrence requires triplet (current value / target / benchmark); bare thresholds forbidden in user-facing sections
- L5 all-pending multi-task (≥2 independent) renders as multi-card, never merged into one card
has_output_contract: true
acceptance_criteria:
- 给定项目 docs 根，产出三段式报告：「现在该做」「也要留意」「诊断依据」（可折叠）
- 前两段每条路由含卡片头 TL;DR 引用块（≤30 字）+ 6 核心字段：theme/governance_context（多行短链每行 ≤25 字）/recommended_skill（含 invocation hint）/rationale/completion_marker/priority_label（紧急/重要/缓/可略/待执行），可选 2 字段 deferral_cost/onboarding_threshold（信息不足时省略，不允许臆造）
- 诊断依据节含治理上下文链（战略目标→路线图→需求/设计→任务）与判定逻辑表格（4 列：层级/节点/状态/推断）；保持 read-only，绝不执行下游 skill
- 步骤 2.2 漂移巡检：比较制品 updated_at 与阈值，超阈值条目进「也要留意」
- 步骤 2.3 卫生巡检：检出未归档完成里程碑 / ADR 状态违规 / 仓库结构问题，进「也要留意」
- 步骤 3.5 chains_to 展开：「现在该做」推荐技能的 chains_to 字段自动追加到「也要留意」，标签「链调」
- 给定项目含代号（T\d+/M\d+/Goal \d+/BL-\d+/ADR-\d+），用户输出节首次出现的代号均附自然语言副标题；字典源按发现顺序：glossary_path 输入 → .ai-cortex/glossary.yaml → docs/glossary.md → 源制品 frontmatter title fallback；双重缺失时进诊断依据节标记，不在用户输出节展示
- 给定 L5 全 pending 多任务（≥2 个独立可启动），渲染为 ≥2 张并列卡片；单卡禁止用顿号/加号/"并行启动"等动词合并多任务
- KPI / 阈值首次出现含三件套（当前值 / 目标值 / 参考系）；MoSCoW 词与治理流程黑话（前置闸门 / 短路 / soft-blocked / 兄弟扫描 / 焦点节点）禁止出现在用户输出节
chains_to: []
triggers_after: []
overlaps_with:
- nesnilnehc/ai-cortex:assess-docs
- nesnilnehc/ai-cortex:audit-docs
market_position: differentiated
tags:
- workflow
- automation
- meta-skill
version: 13.1.1
