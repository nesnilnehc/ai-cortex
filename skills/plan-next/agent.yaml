name: plan-next
status: validated
cognitive_mode: interpretive
primary_use: Inventory governance inputs and produce next-action routing report. v7.0
  actualizes the v6.3 contract — Step 0 Norms Resolution algorithm now executably
  reads artifact_norms_path / norms_proposal_path / ARTIFACT_NORMS.md / .ai-cortex/artifact-norms.yaml
  per artifact-contract §8.2 discovery order into a runtime cache; Step 2.5 explicit
  algorithm selects linking_mode from cache (authoritative / proposal-only / unidentified)
  and emits gate routes accordingly; Step 2.7 S5 task path scan uses cache-resolved
  path_pattern for colocation compatibility. v6.3 features retained (S5 cross-signal
  execution health, Now-tier-scoped downstream evaluation with depth-first breakdown,
  breakdown-tasks in What/When G1, 6-enum linking_mode consumption via discover-docs-norms).
  Default planning-only with execute=false.
inputs:
- trigger context
- optional scope overrides
- optional execute flag (default false)
- optional threshold overrides (commit_idle_days, drift_staleness_days, backlog_min_items, confidence_low_below, task_stuck_days)
- optional task_source, roadmap_tier_source, artifact_norms_path, norms_proposal_path overrides
outputs:
- three-section user-facing report (Now do / Also watch / Diagnosis) with natural-language terms in first two sections
- internal codes (S1-S7, G1-G4, P0-P3) appear only as traceability anchors in the Diagnosis section
- routing recommendations with six fields each (theme, gap, skill, rationale, priority, stop condition)
scores:
  agent_native: 5
  cognitive: 4
  composability: 5
  stance: 5
asqm_quality: 19
overlaps_with:
- nesnilnehc/ai-cortex:assess-docs
- nesnilnehc/ai-cortex:audit-docs
market_position: differentiated
tags:
- workflow
- automation
- meta-skill
version: 7.0.0
validation_gates:
  gate_a:
    name: Agent-ready
    requirement: agent_native >= 4
    status: pass
  gate_b:
    name: Design integrity
    requirement: stance >= 3
    status: pass
