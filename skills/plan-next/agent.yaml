name: plan-next
status: validated
cognitive_mode: interpretive
primary_use: >
  Traverse the goal chain for each strategic goal (top-down) and identify the
  first unready level — producing a next-action routing report. Strictly
  read-only — never executes downstream skills. Chain levels: L1 strategic goal
  → L2 roadmap alignment → L3 requirements → L4 design → L5 tasks → L6
  completion (task status fields only; no git signals for done-check).
  Physical scan of L3-L5 uses cache-resolved path_pattern glob + optional
  parent: frontmatter reverse index + optional manifest file detection.
  Depth-first: report only topmost gap per goal. Multiple parallel goals
  handled by priority order. G1-G4 retained as diagnostic sub-labels.
  Step 0 Norms Resolution loads ARTIFACT_NORMS.md /
  .ai-cortex/artifact-norms.yaml into cache for path_pattern overrides.
inputs:
- trigger context
- optional scope overrides
- optional threshold overrides (commit_idle_days, drift_staleness_days, backlog_min_items, confidence_low_below, task_stuck_days)
- optional task_source, roadmap_tier_source, artifact_norms_path overrides
outputs:
- three-section user-facing report (Now do / Also watch / Diagnosis) with natural-language terms in first two sections
- internal codes (G1-G4, P0-P3) appear only as traceability anchors in the collapsible Diagnosis section
- routing recommendations with five fields each (theme, skill with invocation hint, rationale, priority label, completion marker)
scores:
  agent_native: 5
  cognitive: 4
  composability: 5
  stance: 5
asqm_quality: 19
overlaps_with:
- nesnilnehc/ai-cortex:assess-docs
- nesnilnehc/ai-cortex:audit-docs
market_position: differentiated
tags:
- workflow
- automation
- meta-skill
version: 10.1.0
validation_gates:
  gate_a:
    name: Agent-ready
    requirement: agent_native >= 4
    status: pass
  gate_b:
    name: Design integrity
    requirement: stance >= 3
    status: pass
