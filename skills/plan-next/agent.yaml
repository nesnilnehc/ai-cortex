name: plan-next
status: validated
cognitive_mode: interpretive

primary_use: Discover governance docs by scanning the project repository (confidence-ranked
  by front-matter → heading → filename → directory), inventory input sources, and
  produce a single cycle report with Recommended Next Tasks.

inputs:
- trigger event and context
- optional target scope and mode overrides
- optional urgency or release window

outputs:
- Governance Loop Report (docs/calibration/cognitive-loop.md; overwritten unless snapshot
  requested) — single artifact only; no separate outputs from routed skills
- discovered_sources inventory (path, confidence, discovery_method per governance type)
- routed sequence, aggregated findings, blockers, Recommended Next Tasks (prioritized,
  actionable, owner+scope+rationale)

scores:
  agent_native: 5
  cognitive: 4
  composability: 4
  stance: 5

asqm_quality: 18

overlaps_with:
- nesnilnehc/ai-cortex:align-planning
- nesnilnehc/ai-cortex:align-architecture
- nesnilnehc/ai-cortex:assess-docs
- nesnilnehc/ai-cortex:discover-docs-norms
- nesnilnehc/ai-cortex:bootstrap-docs
- nesnilnehc/ai-cortex:review-code

market_position: differentiated

tags:
- workflow
- automation

validation_gates:
  gate_a:
    name: Agent-ready
    requirement: agent_native >= 4
    status: pass
  gate_b:
    name: Design integrity
    requirement: stance >= 3
    status: pass
