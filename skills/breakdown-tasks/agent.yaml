name: breakdown-tasks
status: validated
primary_use: Break a design document into an executable task list with dependencies,
  acceptance criteria, and assignee or AI execution hints.
inputs:
- Design document (path or content)
- Optional scope or priority hints
- Optional upstream_ref (parent design path; triggers parent: frontmatter emit)
- Optional artifact_norms_path override
outputs:
- Task list document at norms-resolved path (default docs/tasks/<slug>.md)
- parent frontmatter field when upstream_ref provided
has_output_contract: true
acceptance_criteria:
- 给定已验证设计文档，产出 task list 至 norms-resolved 路径（默认 docs/tasks/<slug>.md），front-matter 含 artifact_type=tasks/created_by=breakdown-tasks
- 每个任务条目含 id/title/description/depends_on[]/acceptance/status；依赖图必须无环
- 当 upstream_ref 提供时 front-matter 含 parent 字段指向源设计文档
overlaps_with: []
market_position: differentiated
