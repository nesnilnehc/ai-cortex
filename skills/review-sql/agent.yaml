name: review-sql
status: validated
primary_use: Review SQL and query code for injection, parameterization, indexing/performance,
  transactions, NULL/constraints, portability. Language-only atomic skill; output
  is a findings list.
inputs:
- code scope (files, snippets, or diff containing SQL)
outputs:
- findings list (Location, Category=language-sql, Severity, Title, Description, Suggestion)
has_output_contract: true
acceptance_criteria:
- 给定 SQL 与查询代码范围，产出 findings 列表，每条含 Location/Category=language-sql/Severity/Title/Description/Suggestion
- 聚焦注入风险、参数化、索引与性能、事务、NULL 与约束、方言可移植性
overlaps_with:
- nesnilnehc/ai-cortex:review-codebase
- nesnilnehc/ai-cortex:review-code
- nesnilnehc/ai-cortex:review-security
- nesnilnehc/ai-cortex:review-diff
market_position: commodity
tags:
- code-review
