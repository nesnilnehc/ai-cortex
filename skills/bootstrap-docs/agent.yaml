name: bootstrap-docs
status: validated
primary_use: Bootstrap or adapt project docs using project-documentation-template.
  Initialize (empty) or Adjust (non-empty); use template as target reference in Adjust;
  repeatable; no empty dirs unless requested; strict kebab-case naming. v2.0 adds
  Stage 0 Norms Resolution per artifact-contract §8 for all produced artifacts
  (especially ADRs) — resolves path_pattern and linking_mode from project
  ARTIFACT_NORMS.md; supports colocation and parent-pointer linking modes via
  optional upstream_ref input.
cognitive_mode: procedural
inputs:
- project metadata (name, description, tech stack)
- scale (small | medium | large, optional)
- mode override (initialize | adjust, optional)
outputs:
- Initialize: docs/ directory, VERSION file, summary of created files
- Adjust: recommendation list (markdown), then applied changes and summary after user
    confirmation
scores:
  agent_native: 5
  cognitive: 4
  composability: 4
  stance: 5
asqm_quality: 18
overlaps_with:
- nesnilnehc/ai-cortex:generate-standard-readme
- nesnilnehc/ai-cortex:generate-agent-entry
market_position: differentiated
tags:
- documentation
- writing
validation_gates:
  gate_a:
    name: Agent-ready
    requirement: agent_native >= 4
    status: pass
  gate_b:
    name: Design integrity
    requirement: stance >= 3
    status: pass
