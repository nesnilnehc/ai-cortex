name: review-requirements
status: validated
primary_use: Review an existing requirements document for quality across six dimensions
  (problem clarity, testable needs with R-NN IDs, constraint inventory, scope boundedness,
  open questions); evaluative atomic skill; output is a findings list.
inputs:
- requirements document (path or content)
- optional project context or downstream skill (e.g. "feeds design-solution")
outputs:
- findings list (Location, Category=requirements-quality, Severity, Title, Description,
  Suggestion)
has_output_contract: true
acceptance_criteria:
- 给定需求文档，产出 findings 列表，每条含 Location/Category=requirements-quality/Severity/Title/Description/Suggestion
- 评估问题清晰度、可测试性、约束清单、范围有界性、需求 ID 与开放问题；不重写需求
overlaps_with:
- nesnilnehc/ai-cortex:analyze-requirements
market_position: differentiated
tags:
- code-review
