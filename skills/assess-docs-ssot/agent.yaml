name: assess-docs-ssot
status: validated
primary_use: Assess SSOT integrity and produce intent-driven conflict matrix with
  canonical mapping.
inputs:
- docs scope
- optional conflict threshold
- optional focus layers
outputs:
- docs/calibration/ssot-integrity-audit.md
has_output_contract: true
acceptance_criteria:
- 给定项目 docs 根，产出 docs/calibration/ssot-integrity-audit.md，含意图分类、冲突矩阵（concept/canonical_source/divergent_sources/conflict_kind）与权威源映射表
- 当存在 contradiction 时必须给出 canonical_path 与 superseded_paths 建议，禁止仅输出"存在冲突"而无指向
overlaps_with:
- nesnilnehc/ai-cortex:assess-docs
market_position: differentiated
tags:
- documentation
- workflow
- governance
- ssot
version: 1.0.0
