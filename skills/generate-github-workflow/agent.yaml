name: generate-github-workflow
status: validated
primary_use: Produce GitHub Actions workflow YAML per Appendix A output contract;
  security-first, minimal permissions, version pinning; for CI, release, PR checks.
inputs:
- scenario (CI, PR check, release, scheduled, matrix)
- stack (language, version, package manager, test/build commands)
- triggers (branches, paths, tags)
- target path (default .github/workflows/)
outputs:
- workflow YAML file content
- notes (placeholders, secrets, config items)
has_output_contract: true
acceptance_criteria:
- 产出 GitHub Actions workflow YAML，security-first：permissions 默认最小、actions 版本 pin（commit SHA 或 major-tag 二选一并标注理由）
- 含 placeholders/secrets/config items 注释清单；scenario 与 stack 输入必反映在 jobs/steps 中
overlaps_with: []
market_position: differentiated
tags:
- devops
