name: review-architecture
status: validated
primary_use: Review code for architecture — module and layer boundaries, dependency
  direction, single responsibility, cyclic dependencies, interface stability, and
  coupling. Cognitive-only atomic skill; output is a findings list.
inputs:
- code scope (files or directories or diff)
outputs:
- findings list (Location, Category=cognitive-architecture, Severity, Title, Description, Suggestion)
has_output_contract: true
acceptance_criteria:
- 给定代码范围，产出 findings 列表，每条含 Location/Category=cognitive-architecture/Severity/Title/Description/Suggestion
- findings 聚焦层级与模块边界、依赖方向、单一职责、循环依赖、接口稳定性与耦合；不输出代码补丁
overlaps_with:
- nesnilnehc/ai-cortex:review-codebase
- nesnilnehc/ai-cortex:review-code
- nesnilnehc/ai-cortex:align-architecture
market_position: differentiated
tags:
- code-review
