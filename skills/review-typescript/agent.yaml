name: review-typescript
status: validated
primary_use: Review TypeScript and JavaScript code for type safety, async patterns,
  error handling, module design, runtime correctness, API design, and performance.
  Language-only atomic skill; output is a findings list.
inputs:
- code scope (files or directories or diff containing TypeScript or JavaScript code)
outputs:
- findings list (Location, Category=language-typescript, Severity, Title, Description,
  Suggestion)
has_output_contract: true
acceptance_criteria:
- 给定 TypeScript/JavaScript 代码范围，产出 findings 列表，每条含 Location/Category=language-typescript/Severity/Title/Description/Suggestion
- 聚焦类型安全、async 模式、错误处理与模块设计
overlaps_with:
- nesnilnehc/ai-cortex:review-codebase
- nesnilnehc/ai-cortex:review-code
- nesnilnehc/ai-cortex:review-diff
market_position: commodity
tags:
- code-review
