name: curate-skills
status: validated
primary_use: 检查每个 skill 的 has_output_contract 与 acceptance_criteria，分配 status（validated/experimental/archive_candidate），规范化 agent.yaml 与 README，产出仓库级 SKILL_INVENTORY.md。
inputs:
- skills_directory（包含技能子目录的根路径，例如 skills/）
outputs:
- per skill：agent.yaml（status、has_output_contract、acceptance_criteria、overlaps_with、market_position）、规范化 README.md
- repo-level：SKILL_INVENTORY.md 或结构化聊天摘要
- 重叠与 market_position 报告
has_output_contract: true
acceptance_criteria:
- 给定 skills/ 目录，扫描每个 skill 的 SKILL.md 检测是否含 "## Appendix: Output contract" 或 "## 附录：输出合约/合同/契约"，结果写入 agent.yaml 的 has_output_contract 字段
- 每个 skill 的 agent.yaml 必须有 acceptance_criteria 字段（数组，可空）；status 按规则推导：has_output_contract=true 且 len(acceptance_criteria)>=1 → validated；否则 → experimental；archive_candidate 仅手动设置
- 产出 SKILL_INVENTORY.md 含按 status 分组列表、has_output_contract 覆盖率、acceptance_criteria 缺失清单、最终建议节
chains_to:
- refine-skill-design
triggers_after:
- refine-skill-design
overlaps_with:
- nesnilnehc/ai-cortex:refine-skill-design
- nesnilnehc/ai-cortex:generate-standard-readme
market_position: differentiated
tags:
- meta-skill
- documentation
