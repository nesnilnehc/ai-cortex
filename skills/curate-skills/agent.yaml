agent_native: 4
asqm_quality: 16
cognitive: 4
composability: 3
inputs:
- skills_directory (root path containing skill subdirectories)
lifecycle_state: Experimental
market_position: differentiated
name: curate-skills
outputs:
- per skill: agent.yaml (scores, status, overlaps_with, market_position), normalized
    README.md
- repo-level: ASQM_AUDIT.md or structured chat summary
- overlap and market_position report
overlaps_with:
- nesnilnehc/ai-cortex:refine-skill-design
- nesnilnehc/ai-cortex:generate-standard-readme
primary_use: Evaluate, score (ASQM strict), tag, and normalize all Skills; write agent.yaml
  and README per skill; produce ASQM_AUDIT.md or chat summary. Strict scoring required;
  agent_native 5 only with explicit output contract in SKILL.md.
scores:
  agent_native: 5
  cognitive: 4
  composability: 5
  stance: 5
stance: 5
status: validated
tags:
- meta-skill
- documentation
validation_gates:
  gate_a:
    name: Agent-ready
    requirement: agent_native >= 4
    status: pass
  gate_b:
    name: Design integrity
    requirement: stance >= 3
    status: pass
