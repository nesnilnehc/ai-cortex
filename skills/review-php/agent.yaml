name: review-php
status: validated
primary_use: Review PHP code for language and runtime conventions — strict types, error
  handling, resource management, PSR standards, namespaces, null safety, generators,
  and testability. Language-only atomic skill; output is a findings list.
inputs:
- code scope (files or directories or diff containing PHP code)
outputs:
- findings list (Location, Category=language-php, Severity, Title, Description, Suggestion)
has_output_contract: true
acceptance_criteria:
- 给定 PHP 代码范围，产出 findings 列表，每条含 Location/Category=language-php/Severity/Title/Description/Suggestion
- 聚焦 strict types、错误处理、资源管理、PSR、namespaces、null safety、generators 与 testability
overlaps_with:
- nesnilnehc/ai-cortex:review-codebase
- nesnilnehc/ai-cortex:review-code
- nesnilnehc/ai-cortex:review-diff
market_position: differentiated
tags:
- code-review
