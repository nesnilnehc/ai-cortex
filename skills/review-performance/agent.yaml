name: review-performance
status: validated
primary_use: Review code for performance risks only (complexity, query efficiency,
  I/O, memory, contention, caching, regression risk); output is a findings list for
  aggregation.
cognitive_mode: interpretive
inputs:
- code scope (files or directories or diff provided by caller)
outputs:
- findings list (Location, Category=cognitive-performance, Severity, Title, Description,
  Suggestion)
scores:
  agent_native: 4
  cognitive: 4
  composability: 4
  stance: 5
asqm_quality: 17
overlaps_with:
- nesnilnehc/ai-cortex:review-codebase
- nesnilnehc/ai-cortex:review-code
- nesnilnehc/ai-cortex:review-diff
market_position: commodity
tags:
- code-review
- optimization
validation_gates:
  gate_a:
    name: Agent-ready
    requirement: agent_native >= 4
    status: pass
  gate_b:
    name: Design integrity
    requirement: stance >= 3
    status: pass
