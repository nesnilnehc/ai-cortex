name: assess-docs-links
status: validated
primary_use: Assess document graph health and report link-related risks.
inputs:
- docs root
- optional path filters
- optional depth threshold
outputs:
- docs/calibration/doc-link-health.md
has_output_contract: true
acceptance_criteria:
- 给定 docs 根，产出 docs/calibration/doc-link-health.md 含断链/孤儿/循环/深链四类清单，每条断链含 source_path/target_ref/kind（404/anchor_missing/external_unreachable）
- 产出 link_health YAML 块含 broken[]/orphans[]/cycles[]/deep_chains[]
overlaps_with:
- nesnilnehc/ai-cortex:assess-docs
market_position: differentiated
tags:
- documentation
- workflow
- governance
version: 1.0.0
