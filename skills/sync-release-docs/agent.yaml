name: sync-release-docs
status: validated
primary_use: Sync project documentation after release. Cross-references diff, updates
  README/ARCHITECTURE/CONTRIBUTING/CLAUDE.md, polishes CHANGELOG voice, cleans up
  TODOS. Use when asked to "update the docs", "sync documentation", or "post-ship
  docs".
inputs:
- optional base branch name (otherwise detected from project config)
- feature branch with unmerged doc changes
outputs:
- updated documentation files (if any) and single commit
- structured doc health summary
has_output_contract: true
acceptance_criteria:
- 读取所有 docs 后与 release diff 交叉对照，更新 README/ARCHITECTURE/CONTRIBUTING/CLAUDE.md/CHANGELOG/TODOs 至与已发布行为一致
- 所有改动落入单次 commit（Conventional Commits）；产出健康摘要含 files_updated[]/files_skipped[]（含理由）/todos_resolved[]/commit_hash
overlaps_with:
- nesnilnehc/ai-cortex:discover-docs-norms
- nesnilnehc/ai-cortex:assess-docs
- nesnilnehc/ai-cortex:bootstrap-docs
market_position: differentiated
tags:
- documentation
- workflow
